<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - AdhikarNOW</title>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/font-awesome/4.7.0/css/font-awesome.min.css">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden; /* Prevents scrollbars from the canvas */
        }

        /* The canvas will be our animated background */
        #bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1; /* Place it behind all other content */
        }

        /* Container to center the signup form */
        .signup-container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
        }

        /* The actual signup card */
        .signup-card {
            background: rgba(10, 25, 47, 0.85); /* Dark blue, semi-transparent */
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            backdrop-filter: blur(8px); /* Frosted glass effect */
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.18);
            width: 100%;
            max-width: 450px;
        }

        .signup-card h2 {
            font-weight: bold;
            color: #fff;
            margin-bottom: 30px;
        }
        
        .form-control {
            background-color: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
        }

        .form-control:focus {
            background-color: rgba(255, 255, 255, 0.2);
            color: white;
            box-shadow: none;
            border-color: #dc3545;
        }

        .form-control::placeholder {
            color: #ccc;
        }

        .btn-danger {
            background-color: #dc3545;
            border-color: #dc3545;
            font-weight: bold;
            padding: 10px;
        }
        
        .login-link {
            font-size: 0.9rem;
            margin-top: 15px;
        }
        .login-link a {
            color: #dc3545;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <canvas id="bg-canvas"></canvas>

    <div class="signup-container">
        <div class="signup-card text-center">
            <h2>Create Your Account</h2>
            <p class="text-muted mb-4">Join AdhikarNOW to access simplified justice.</p>
            <form>
                <div class="form-group text-left">
                    <label>Full Name</label>
                    <input type="text" class="form-control" placeholder="Enter your full name" required>
                </div>
                <div class="form-group text-left">
                    <label>Email Address</label>
                    <input type="email" class="form-control" placeholder="Enter your email" required>
                </div>
                <div class="form-group text-left">
                    <label>Password</label>
                    <input type="password" class="form-control" placeholder="Create a password" required>
                </div>
                <button type="submit" class="btn btn-danger btn-block mt-4">Sign Up</button>
            </form>
            <p class="login-link text-muted">Already have an account? <a href="#">Log In</a></p>
        </div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.157.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // 1. Scene Setup
        const scene = new THREE.Scene();

        // 2. Camera Setup
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 5;

        // 3. Renderer Setup
        const canvas = document.getElementById('bg-canvas');
        const renderer = new THREE.WebGLRenderer({
            canvas: canvas,
            antialias: true,
        });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);

        // 4. Create the 3D Object (Scales of Justice)
        const shape = new THREE.Shape();
        // Base
        shape.moveTo(-1, -0.1);
        shape.lineTo(1, -0.1);
        shape.lineTo(1, -0.3);
        shape.lineTo(-1, -0.3);
        shape.lineTo(-1, -0.1);
        // Pillar
        const pillar = new THREE.Path();
        pillar.moveTo(-0.1, -0.1);
        pillar.lineTo(-0.1, 1);
        pillar.lineTo(0.1, 1);
        pillar.lineTo(0.1, -0.1);
        shape.holes.push(pillar);
        // Top Beam
        const beam = new THREE.Path();
        beam.moveTo(-1.2, 1);
        beam.lineTo(-1.2, 1.1);
        beam.lineTo(1.2, 1.1);
        beam.lineTo(1.2, 1);
        shape.holes.push(beam);
        
        const extrudeSettings = { depth: 0.2, bevelEnabled: true, bevelSegments: 2, steps: 2, bevelSize: 0.05, bevelThickness: 0.05 };
        const geometry = new THREE.ExtrudeGeometry(shape, extrudeSettings);
        geometry.center(); // Center the geometry

        const material = new THREE.MeshStandardMaterial({ 
            color: 0xdc3545, // AdhikarNOW red color
            metalness: 0.7,
            roughness: 0.2
        });
        const scales = new THREE.Mesh(geometry, material);
        scene.add(scales);

        // 5. Add Lighting
        const pointLight = new THREE.PointLight(0xffffff, 1.5);
        pointLight.position.set(5, 5, 5);
        scene.add(pointLight);

        const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
        scene.add(ambientLight);

        // 6. Animation Loop
        function animate() {
            requestAnimationFrame(animate);

            // Rotate the object
            scales.rotation.x += 0.001;
            scales.rotation.y += 0.005;

            renderer.render(scene, camera);
        }

        // Handle window resizing
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Start the animation
        animate();
    </script>

</body>
</html>
